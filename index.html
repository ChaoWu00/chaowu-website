<!DOCTYPE html>

<html>
<head>
<title>超五 CHAO WU</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    height:100vh;
    background: url('sasuke.jpg') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* efek gelap */
.overlay {
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

/* efek tulisan */
.text {
    position:relative;
    color:white;
    text-align:center;
    animation:glow 2s infinite;
}

@keyframes glow {
    0% { text-shadow:0 0 10px red; }
    50% { text-shadow:0 0 30px purple; }
    100% { text-shadow:0 0 10px red; }
}

.title {
    font-size:70px;
}

.subtitle {
    color:red;
    letter-spacing:5px;
}

/* efek zoom pelan */
body {
    animation:zoom 10s infinite alternate;
}

@keyframes zoom {
    from { background-size:100%; }
    to { background-size:110%; }
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="text">
    <div class="title">超五</div>
    <div class="subtitle">CHAO WU</div>
</div>

</body>
</html>
